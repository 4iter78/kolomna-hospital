{% extends "main.html" %}
{% block content %}

  <div class="table-toolbar">
    <button class="btn-action btn-create" onclick="openModal('modal-create')">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor"><path d="M8 2a.5.5 0 0 1 .5.5v5h5a.5.5 0 0 1 0 1h-5v5a.5.5 0 0 1-1 0v-5h-5a.5.5 0 0 1 0-1h5v-5A.5.5 0 0 1 8 2z"/></svg> Создать запись
    </button>
    <span class="record-count">Записей: {{count}}</span>
  </div>

  <table class="table table-striped">
    <thead><tr><th>ID</th><th>Наименование</th><th>Действия</th></tr></thead>
    <tbody>
      {% for diagnosis in diagnosises %}
      <tr data-id="{{ diagnosis.id }}" data-name="{{ diagnosis.name }}">
        <td>{{ diagnosis.id }}</td><td>{{ diagnosis.name }}</td>
        <td><div class="actions-cell">
          <button class="btn-action btn-edit"
                  onclick="openEditModal({{ diagnosis.id }})">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M12.854.146a.5.5 0 0 0-.707 0L10.5 1.793 14.207 5.5l1.647-1.646a.5.5 0 0 0 0-.708l-3-3zm-1.96 2.708L4.5 9.25V11.5h2.25l6.395-6.396-2.25-2.25zM3.5 10.5v1h1l-1-1z"/></svg> Изменить
          </button>
          <button class="btn-action btn-delete"
                  onclick="deleteRecord('/diagnosises/', {{ diagnosis.id }})">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M5.5 5.5A.5.5 0 0 1 6 6v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm2.5 0a.5.5 0 0 1 .5.5v6a.5.5 0 0 1-1 0V6a.5.5 0 0 1 .5-.5zm3 .5a.5.5 0 0 0-1 0v6a.5.5 0 0 0 1 0V6z"/><path fill-rule="evenodd" d="M14.5 3a1 1 0 0 1-1 1H13v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4h-.5a1 1 0 0 1 0-2h3.5l1-1h3l1 1H14.5a1 1 0 0 1 1 1zM4.118 4 4 4.059V13a1 1 0 0 0 1 1h6a1 1 0 0 0 1-1V4.059L11.882 4H4.118z"/></svg> Удалить
          </button>
        </div></td>
      </tr>
      {% endfor %}
    </tbody>
  </table>


  <div id="modal-create" class="modal-overlay" onclick="closeOnOverlay(event,'modal-create')">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Создать: Диагноз</h3>
        <button class="modal-close" onclick="closeModal('modal-create')">✕</button>
      </div>
      <form method="POST" action="/diagnosises">
        <div class="modal-body">
          <div class="form-group">
            <label class="form-label">Наименование</label>
            <input class="form-control" type="text" name="name"  placeholder="Введите наименование" required>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn-action btn-edit" onclick="closeModal('modal-create')">Отмена</button>
          <button type="submit" class="btn-action btn-create">Сохранить</button>
        </div>
      </form>
    </div>
  </div>

  <div id="modal-edit" class="modal-overlay" onclick="closeOnOverlay(event,'modal-edit')">
    <div class="modal-box">
      <div class="modal-header">
        <h3>Редактировать: Диагноз</h3>
        <button class="modal-close" onclick="closeModal('modal-edit')">✕</button>
      </div>
      <div class="modal-body">
        <form id="edit-form">
          <input type="hidden" name="id" id="edit-id">
          <div class="form-group">
            <label class="form-label">Наименование</label>
            <input class="form-control" type="text" name="name" id="edit-name" placeholder="Введите наименование" required>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn-action btn-edit" onclick="closeModal('modal-edit')">Отмена</button>
        <button type="button" class="btn-action btn-create"
                onclick="submitEdit('/diagnosises/','edit-form','modal-edit')">Сохранить</button>
      </div>
    </div>
  </div>
  {% block scripts %}
  <script>
    function openEditModal(id) {
      const r = document.querySelector(`tr[data-id="${id}"]`);
      document.getElementById('edit-id').value   = id;
      document.getElementById('edit-name').value = r.dataset.name;
      openModal('modal-edit');
    }
  </script>
  {% endblock %}

{% endblock %}
